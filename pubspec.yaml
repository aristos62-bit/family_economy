name: family_economy
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  responsive_framework: ^1.5.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  provider: ^6.1.2
  uuid: ^4.5.3
  connectivity_plus: ^7.0.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  fl_chart: ^1.1.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  permission_handler: ^12.0.1
  pdf: ^3.11.3
  excel: ^4.0.6
  file_picker: ^10.3.10
  http: ^1.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/accounts/
    - assets/icons/categories/income/
    - assets/icons/categories/expense/
    - assets/icons/subcategories/income/
    - assets/icons/subcategories/expense/
    - assets/icons/default.webp
    - assets/icons/default_account.webp
    - assets/icons/default_categories.webp
    - assets/icons/default_subcategories.webp
    - assets/icons/app_icon.png


  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
        - asset: assets/fonts/NotoSans-Italic.ttf